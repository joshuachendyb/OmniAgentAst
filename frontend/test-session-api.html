<!DOCTYPE html>
<html>
<head>
    <title>会话管理API联调测试 - 小新第二</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .step { margin: 10px 0; padding: 8px; background: #f9f9f9; border-left: 3px solid #ccc; }
    </style>
</head>
<body>
    <h1>会话管理API联调测试 - 小新第二</h1>
    <p>测试时间: 2026-03-01 20:19:41</p>
    
    <div id="test-log" style="margin-bottom: 20px;"></div>
    
    <div class="test-section">
        <h2>会话管理API测试套件</h2>
        <button onclick="runAllTests()">运行完整测试套件</button>
        <button onclick="clearLog()">清除日志</button>
    </div>
    
    <div class="test-section">
        <h2>1. 创建会话接口测试</h2>
        <button onclick="testCreateSession()">测试创建会话</button>
        <div id="create-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 会话列表接口测试</h2>
        <button onclick="testListSessions()">测试会话列表</button>
        <div id="list-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 会话消息接口测试</h2>
        <button onclick="testSessionMessages()">测试会话消息</button>
        <div id="messages-result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 保存消息接口测试</h2>
        <button onclick="testSaveMessage()">测试保存消息</button>
        <div id="save-result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. 更新会话标题接口测试</h2>
        <button onclick="testUpdateSession()">测试更新会话标题</button>
        <div id="update-result"></div>
    </div>
    
    <div class="test-section">
        <h2>6. 删除会话接口测试</h2>
        <button onclick="testDeleteSession()">测试删除会话</button>
        <div id="delete-result"></div>
    </div>
    
    <div class="test-section">
        <h2>7. 批量获取会话标题接口测试</h2>
        <button onclick="testBatchGetTitles()">测试批量获取标题</button>
        <div id="batch-result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        let testSessionId = null; // 用于存储创建的会话ID

        function addToLog(message, type = 'info') {
            const logDiv = document.getElementById('test-log');
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('test-log').innerHTML = '';
        }

        async function apiCall(method, endpoint, data = null) {
            try {
                const config = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) {
                    config.body = JSON.stringify(data);
                }
                
                const response = await fetch(`${API_BASE}${endpoint}`, config);
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${result.error || 'Unknown error'}`);
                }
                
                return { success: true, data: result };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function testCreateSession() {
            addToLog('开始测试创建会话接口...', 'info');
            const resultDiv = document.getElementById('create-result');
            
            try {
                const response = await apiCall('POST', '/sessions', { title: '测试会话 - ' + new Date().toISOString() });
                
                if (response.success) {
                    testSessionId = response.data.session_id;
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 创建会话成功，会话ID: ' + testSessionId, 'success');
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 创建会话失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 创建会话异常: ' + error.message, 'error');
            }
        }

        async function testListSessions() {
            addToLog('开始测试会话列表接口...', 'info');
            const resultDiv = document.getElementById('list-result');
            
            try {
                const response = await apiCall('GET', '/sessions?page=1&page_size=10');
                
                if (response.success) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 获取会话列表成功，总数: ' + response.data.total, 'success');
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 获取会话列表失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 获取会话列表异常: ' + error.message, 'error');
            }
        }

        async function testSessionMessages() {
            if (!testSessionId) {
                addToLog('❌ 需要先创建会话进行测试', 'error');
                document.getElementById('messages-result').innerHTML = '<pre class="error">请先创建会话</pre>';
                return;
            }
            
            addToLog('开始测试会话消息接口...', 'info');
            const resultDiv = document.getElementById('messages-result');
            
            try {
                const response = await apiCall('GET', `/sessions/${testSessionId}/messages`);
                
                if (response.success) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 获取会话消息成功，消息数: ' + (response.data.messages ? response.data.messages.length : 0), 'success');
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 获取会话消息失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 获取会话消息异常: ' + error.message, 'error');
            }
        }

        async function testSaveMessage() {
            if (!testSessionId) {
                addToLog('❌ 需要先创建会话进行测试', 'error');
                document.getElementById('save-result').innerHTML = '<pre class="error">请先创建会话</pre>';
                return;
            }
            
            addToLog('开始测试保存消息接口...', 'info');
            const resultDiv = document.getElementById('save-result');
            
            try {
                const messageData = {
                    role: 'user',
                    content: '这是测试消息 - ' + new Date().toISOString()
                };
                
                const response = await apiCall('POST', `/sessions/${testSessionId}/messages`, messageData);
                
                if (response.success) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 保存消息成功', 'success');
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 保存消息失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 保存消息异常: ' + error.message, 'error');
            }
        }

        async function testUpdateSession() {
            if (!testSessionId) {
                addToLog('❌ 需要先创建会话进行测试', 'error');
                document.getElementById('update-result').innerHTML = '<pre class="error">请先创建会话</pre>';
                return;
            }
            
            addToLog('开始测试更新会话标题接口...', 'info');
            const resultDiv = document.getElementById('update-result');
            
            try {
                // 首先获取会话信息以获取版本号
                const sessionResponse = await apiCall('GET', `/sessions/${testSessionId}/messages`);
                if (!sessionResponse.success) {
                    resultDiv.innerHTML = `<pre class="error">获取会话信息失败: ${sessionResponse.error}</pre>`;
                    addToLog('❌ 获取会话信息失败: ' + sessionResponse.error, 'error');
                    return;
                }
                
                const version = sessionResponse.data.version || 1;
                const updateData = {
                    title: '更新的测试标题 - ' + new Date().toISOString(),
                    version: version,
                    updated_by: 'test'
                };
                
                const response = await apiCall('PUT', `/sessions/${testSessionId}`, updateData);
                
                if (response.success) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 更新会话标题成功', 'success');
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 更新会话标题失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 更新会话标题异常: ' + error.message, 'error');
            }
        }

        async function testDeleteSession() {
            if (!testSessionId) {
                addToLog('❌ 需要先创建会话进行测试', 'error');
                document.getElementById('delete-result').innerHTML = '<pre class="error">请先创建会话</pre>';
                return;
            }
            
            addToLog('开始测试删除会话接口...', 'info');
            const resultDiv = document.getElementById('delete-result');
            
            try {
                const response = await apiCall('DELETE', `/sessions/${testSessionId}`);
                
                if (response.success) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 删除会话成功', 'success');
                    testSessionId = null; // 清除会话ID
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 删除会话失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 删除会话异常: ' + error.message, 'error');
            }
        }

        async function testBatchGetTitles() {
            if (!testSessionId) {
                addToLog('❌ 需要先创建会话进行测试', 'error');
                document.getElementById('batch-result').innerHTML = '<pre class="error">请先创建会话</pre>';
                return;
            }
            
            addToLog('开始测试批量获取会话标题接口...', 'info');
            const resultDiv = document.getElementById('batch-result');
            
            try {
                const response = await apiCall('GET', `/sessions/titles/batch?session_ids=${testSessionId}`);
                
                if (response.success) {
                    resultDiv.innerHTML = `<pre class="success">${JSON.stringify(response.data, null, 2)}</pre>`;
                    addToLog('✅ 批量获取会话标题成功', 'success');
                } else {
                    resultDiv.innerHTML = `<pre class="error">错误: ${response.error}</pre>`;
                    addToLog('❌ 批量获取会话标题失败: ' + response.error, 'error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
                addToLog('❌ 批量获取会话标题异常: ' + error.message, 'error');
            }
        }

        async function runAllTests() {
            addToLog('开始运行完整会话管理API测试套件...', 'info');
            
            // 运行所有测试
            await testCreateSession();
            await new Promise(resolve => setTimeout(resolve, 1000)); // 等待1秒
            
            await testListSessions();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testSessionMessages();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testSaveMessage();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testUpdateSession();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testBatchGetTitles();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // 重复获取以验证更新
            await testSessionMessages();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // 最后删除测试会话
            await testDeleteSession();
            
            addToLog('✅ 完整测试套件运行完毕', 'success');
        }
    </script>
</body>
</html>
