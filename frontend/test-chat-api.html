<!DOCTYPE html>
<html>
<head>
    <title>聊天API测试 - 小新第二</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>聊天API联调测试 - 小新第二</h1>
    <p>测试时间: 2026-03-01 20:19:41</p>
    
    <div class="test-section">
        <h2>测试1: 健康检查接口</h2>
        <button onclick="testHealth()">测试健康检查</button>
        <div id="health-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2: 普通聊天接口</h2>
        <button onclick="testChat()">测试普通聊天</button>
        <div id="chat-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试3: 流式聊天接口</h2>
        <button onclick="testStreamChat()">测试流式聊天</button>
        <div id="stream-result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        
        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                resultDiv.innerHTML = `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
            }
        }
        
        async function testChat() {
            const resultDiv = document.getElementById('chat-result');
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: '你好，这是一个测试消息' }],
                        stream: false
                    })
                });
                const data = await response.json();
                resultDiv.innerHTML = `<pre class="${data.success ? 'success' : 'error'}">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
            }
        }
        
        async function testStreamChat() {
            const resultDiv = document.getElementById('stream-result');
            resultDiv.innerHTML = '<p>正在连接...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: '你好' }],
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `<pre class="error">HTTP错误 ${response.status}: ${errorText}</pre>`;
                    return;
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let output = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    output += chunk + '\n';
                    resultDiv.innerHTML = `<pre>${output}</pre>`;
                }
                
                resultDiv.innerHTML = `<pre class="success">${output}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre class="error">错误: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
