<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown + LaTeX 解析测试</title>
  
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  
  <!-- marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    
    h1 { color: #333; border-bottom: 2px solid #1890ff; padding-bottom: 10px; }
    
    .test-section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .test-title { font-size: 18px; font-weight: bold; color: #1890ff; margin-bottom: 15px; }
    .label { font-size: 14px; color: #666; margin-bottom: 8px; font-weight: bold; }
    
    .content-box {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 12px;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
    }
    
    .result-box {
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 4px;
      padding: 20px;
      margin-top: 15px;
      line-height: 2;
      font-size: 15px;
    }
    
    .success { color: #52c41a; font-weight: bold; }
    .error-text { color: #f5222d; }
    
    .katex-display { margin: 1em 0; overflow-x: auto; overflow-y: hidden; }
  </style>
</head>
<body>
  <h1>🔬 Markdown + LaTeX 解析测试（完整版）</h1>
  
  <div class="test-section">
    <div class="test-title">测试：JSON 文件完整 content（147 行）</div>
    <div class="label">原始内容（部分）：</div>
    <div class="content-box" id="json-content"></div>
    <div class="label" style="margin-top:15px">渲染效果：</div>
    <div class="result-box" id="json-result"></div>
  </div>
  
  <div class="test-section">
    <div class="test-title">状态</div>
    <div id="status"></div>
  </div>

  <script>
    // 从 JSON 文件提取的完整 content
    const fullContent = `We need to compute the expression: 1200*23 - 34/3 + 34 - 90*7 - 20000.

Interpretation: standard arithmetic with integer multiplication and division? The expression includes division 34/3. Is it integer division or real? Usually in such problems, they might want integer division? But 34/3 is not integer. Usually they'd treat as fraction (real number) and compute final result as real number. Could also be integer division truncating? Usually in programming languages, if both operands are integers, 34/3 = 11 (integer division). But the problem is ambiguous. Let's assume standard arithmetic with real division: 34/3 ≈ 11.333... Let's compute.

First compute each term:

1200*23 = 1200 * 23 = (12*23)*100 = 276*100 = 27600.

90*7 = 630.

Now expression: 27600 - 34/3 + 34 - 630 - 20000.

Combine: 27600 - 630 - 20000 = 27600 - 20630 = 6970? Wait compute: 27600 - 630 = 26970. Then 26970 - 20000 = 6970. Yes.

Now we have 6970 - 34/3 + 34.

Compute 34 - 34/3 = (34*3/3 - 34/3) = (102 - 34)/3 = 68/3 = 22.666666... Actually 68/3 = 22.666... So 6970 + 68/3.

Now 6970 = 6970 * 3/3 = 20910/3. Then sum = (20910 + 68)/3 = 20978/3.

Compute 20978 / 3 = 6992.666666... Actually 3*6992 = 20976, remainder 2, so 6992 + 2/3 = 6992.666666...

Thus result = 20978/3 ≈ 6992.6667.

Alternatively, if integer division (floor/truncate) used: 34/3 = 11. Then expression: 27600 - 11 + 34 - 630 - 20000 = 27600 - 11 = 27589; +34 = 27623; -630 = 26993; -20000 = 6993. So integer division yields 6993.

Which answer is more plausible? The problem is from a typical math puzzle, not programming, so real division is expected. The answer would be a rational number: 20978/3 or 6992 2/3.

But the problem says "Please reason step by step, and put your final answer within \\boxed{}." Usually they'd want a simplified fraction or integer. Let's give final answer as \\boxed{\\frac{20978}{3}} or as decimal.

Better to present as \\boxed{6992\\frac{2}{3}}.

But we need to be careful: The expression "1200*23-34/3+34-90*7-20000". There's no parentheses. According to order of operations, multiplication and division before addition/subtraction, left to right. So we did that. Good.

Double-check each term:

- 1200*23 = 27600.
- 34/3 = 11.333... (approx).
- 90*7 = 630.

Now compute expression: 27600 - 11.333... + 34 - 630 - 20000.

Combine: 27600 - 630 - 20000 = 6970. Then add -11.333... + 34 = +22.666..., total = 6992.666... Yes.

Now maybe they'd want a simplified exact answer: 20978/3.

Let's compute exact rational:

27600 = 27600 = 27600 * 3/3 = 82800/3.

- 34/3 = -34/3.

+ 34 = 34*3/3 = 102/3.

- 630 = -630*3/3 = -1890/3.

- 20000 = -20000*3/3 = -60000/3.

Sum numerator: 82800 - 34 + 102 - 1890 - 60000 = ?

Compute stepwise:

82800 - 34 = 82766.
+102 = 82868.
-1890 = 80978.
-60000 = 20978.

Thus numerator = 20978/3. Yes.

Simplify fraction: gcd(20978,3) = 1 because 20978 mod 3 = 2 (since 20976 divisible by 3). So fraction is irreducible.

Thus final answer: \\boxed{\\frac{20978}{3}}.

Alternatively, if they'd want decimal: \\boxed{6992.\\overline{6}}.

Better to give fraction.

Thus answer: \\boxed{\\frac{20978}{3}}.

Now let's produce step-by-step reasoning.

Will include order of operations, conversion to common denominator, etc.

Potential pitfalls: Some might incorrectly apply left-to-right for subtraction and addition after multiplication/division. But we did correct.

Thus final answer.

Now produce final answer with \\boxed{}.


**Step‑by‑step evaluation**

The expression is  

\\[
1200*23-34/3+34-90*7-20000 .
\\]

1. **Perform the multiplications and the division** (these have higher precedence than addition/subtraction):

\\[
\\begin{aligned}
1200*23 &= 27600,\\\\[2pt]
34/3   &= \\frac{34}{3},\\\\[2pt]
90*7   &= 630 .
\\end{aligned}
\\]

2. **Rewrite the expression with these results**:

\\[
27600-\\frac{34}{3}+34-630-20000 .
\\]

3. **Combine the integer terms** (addition/subtraction of whole numbers):

\\[
27600-630-20000 = 6970 .
\\]

So the expression becomes  

\\[
6970-\\frac{34}{3}+34 .
\\]

4. **Combine the remaining fractional part**:

\\[
34-\\frac{34}{3}= \\frac{102}{3}-\\frac{34}{3}= \\frac{68}{3}.
\\]

5. **Add this to the integer part**:

\\[
6970+\\frac{68}{3}= \\frac{6970\\cdot 3}{3}+\\frac{68}{3}
               = \\frac{20910+68}{3}
               = \\frac{20978}{3}.
\\]

6. **Simplify** – the numerator and denominator share no common factor (20978 mod 3 = 2), so the fraction is already in lowest terms.

\\[
\\boxed{\\dfrac{20978}{3}}
\\]

(If a decimal form is preferred, this equals \\(6992.\\overline{6}\\).)`;

    // 显示原始内容（前 2000 字符）
    document.getElementById('json-content').textContent = fullContent.substring(0, 2000) + '\n\n...（内容过长，只显示部分）';
    
    const statusDiv = document.getElementById('status');
    
    // 解析函数
    function parseLaTeX(content) {
      let processed = content;
      
      // 1. 处理 \\[ ... \\] - 区块公式
      processed = processed.replace(/\\\\\[([\s\S]*?)\\\\\]/g, function(match, formula) {
        try {
          return katex.renderToString(formula.trim(), { displayMode: true, throwOnError: false });
        } catch(e) { 
          console.error('\\\\[ 解析错误:', e.message);
          return match; 
        }
      });
      
      // 2. 处理 \\( ... \\) - 行内公式
      processed = processed.replace(/\\\\\(([\s\S]*?)\\\\\)/g, function(match, formula) {
        try {
          return katex.renderToString(formula.trim(), { displayMode: false, throwOnError: false });
        } catch(e) { return match; }
      });
      
      // 3. 处理 \\boxed{}
      processed = processed.replace(/\\\\boxed\{([^}]+)\}/g, function(match, content) {
        try {
          return katex.renderToString('\\boxed{' + content + '}', { displayMode: false, throwOnError: false });
        } catch(e) { return match; }
      });
      
      // 4. 处理 \\dfrac{}{}
      processed = processed.replace(/\\\\dfrac\{([^}]+)\}\{([^}]+)\}/g, function(match, num, den) {
        try {
          return katex.renderToString('\\dfrac{' + num + '}{' + den + '}', { displayMode: false, throwOnError: false });
        } catch(e) { return match; }
      });
      
      // 5. 处理 \\frac{}{}
      processed = processed.replace(/\\\\frac\{([^}]+)\}\{([^}]+)\}/g, function(match, num, den) {
        try {
          return katex.renderToString('\\frac{' + num + '}{' + den + '}', { displayMode: false, throwOnError: false });
        } catch(e) { return match; }
      });
      
      // 6. 处理 \\overline{}
      processed = processed.replace(/\\\\overline\{([^}]+)\}/g, function(match, content) {
        try {
          return katex.renderToString('\\overline{' + content + '}', { displayMode: false, throwOnError: false });
        } catch(e) { return match; }
      });
      
      // 7. 处理 \\begin{aligned}...\\end{aligned}
      processed = processed.replace(/\\\\begin\{aligned\}([\s\S]*?)\\\\end\{aligned\}/g, function(match, content) {
        try {
          return katex.renderToString('\\begin{aligned}' + content + '\\end{aligned}', { displayMode: true, throwOnError: false });
        } catch(e) { return match; }
      });
      
      // 8. 处理 \\\\ （LaTeX 换行）
      processed = processed.replace(/\\\\\\\\/g, '\\\\');
      
      // 9. 处理 \\cdot
      processed = processed.replace(/\\\\cdot/g, '\\cdot');
      
      return processed;
    }
    
    try {
      if (typeof katex === 'undefined') throw new Error('KaTeX 未加载!');
      
      console.log('开始解析...');
      
      // 先解析 LaTeX
      const latexProcessed = parseLaTeX(fullContent);
      
      // 再解析 Markdown
      marked.setOptions({ 
        breaks: true, 
        gfm: true,
        headerIds: false
      });
      
      const htmlContent = marked.parse(latexProcessed);
      
      document.getElementById('json-result').innerHTML = htmlContent;
      
      statusDiv.innerHTML = '<span class="success">✅ 解析完成！请查看下方渲染效果</span>';
      
      console.log('解析完成');
      
    } catch(error) {
      console.error('解析失败:', error);
      statusDiv.innerHTML = '<span class="error-text">❌ 错误：' + error.message + '</span>';
    }
  </script>
</body>
</html>
