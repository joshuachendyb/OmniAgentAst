<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LaTeX 解析 - 工作版</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; border-bottom: 2px solid #1890ff; padding-bottom: 10px; }
    .section { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .title { font-size: 18px; font-weight: bold; color: #1890ff; margin-bottom: 15px; }
    .result-box { background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 4px; padding: 20px; line-height: 2; font-size: 15px; }
    .success { color: #52c41a; font-weight: bold; }
    .katex { font-size: 1.1em; }
    input[type="file"] { margin: 20px 0; padding: 15px; border: 2px dashed #1890ff; border-radius: 8px; width: 100%; max-width: 600px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🔬 LaTeX 解析 - 工作版</h1>
  <div class="section">
    <h2>选择 JSON 文件</h2>
    <input type="file" id="fileInput" accept=".json" />
    <div id="status"></div>
  </div>
  <div class="section" id="sec4" style="display:none;">
    <div class="title">渲染结果</div>
    <div class="result-box" id="rendered"></div>
  </div>
  <script>
    // 找到匹配的右括号
    function findMatchingBrace(text, start) {
      let depth = 1;
      for (let i = start; i < text.length; i++) {
        if (text[i] === '{') depth++;
        else if (text[i] === '}') {
          depth--;
          if (depth === 0) return i;
        }
      }
      return -1;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const json = JSON.parse(event.target.result);
        const content = json.content || '';
        renderContent(content);
        document.getElementById('sec4').style.display = 'block';
      };
      reader.readAsText(file, 'utf-8');
    });

    function renderContent(content) {
      let p = content;
      let count = 0;

      // 1. \[ ... \] - 使用 RegExp 构造
      p = p.replace(new RegExp('\\\[([\s\S]*?)\\\]', 'g'), (m, f) => {
        try { return katex.renderToString(f.trim(), { displayMode: true, throwOnError: false }); } catch(e) { return m; }
      });

      // 2. \begin{aligned}
      p = p.replace(/\begin\{aligned\}([\s\S]*?)\end\{aligned\}/g, (m, i) => {
        try { return katex.renderToString('\begin{aligned}' + i + '\end{aligned}', { displayMode: true, throwOnError: false }); } catch(e) { return m; }
      });

      // 3. \ 换行
      p = p.replace(/\\/g, '\\');

      // 4. \cdot
      p = p.replace(/\cdot/g, '\cdot');

      // 5. \overline{}
      p = p.replace(/\overline\{([^}]+)\}/g, (m, a) => {
        try { return katex.renderToString('\overline{' + a + '}', { displayMode: false, throwOnError: false }); } catch(e) { return m; }
      });

      // 6. \dfrac{}{}
      p = p.replace(/\dfrac\{([^}]+)\}\{([^}]+)\}/g, (m, a, b) => {
        try { return katex.renderToString('\dfrac{' + a + '}{' + b + '}', { displayMode: false, throwOnError: false }); } catch(e) { return m; }
      });

      // 7. \frac{}{}
      p = p.replace(/\frac\{([^}]+)\}\{([^}]+)\}/g, (m, a, b) => {
        try { return katex.renderToString('\frac{' + a + '}{' + b + '}', { displayMode: false, throwOnError: false }); } catch(e) { return m; }
      });

      // 8. \boxed{} - 循环处理直到没有为止
      let maxIter = 20;
      while (p.includes('\boxed{') && maxIter-- > 0) {
        const idx = p.indexOf('\boxed{');
        const start = idx + 7;
        const end = findMatchingBrace(p, start);
        if (end === -1) break;
        const inner = p.substring(start, end);
        console.log('boxed 内容:', inner);
        try {
          p = p.substring(0, idx) + katex.renderToString('\boxed{' + inner + '}', { displayMode: false, throwOnError: false }) + p.substring(end + 1);
          count++;
        } catch(e) {
          console.error('boxed 失败:', e.message);
          break;
        }
      }
      console.log('处理了', count, '个 boxed');

      marked.setOptions({ breaks: true, gfm: true, headerIds: false });
      document.getElementById('rendered').innerHTML = marked.parse(p);
      document.getElementById('status').innerHTML = '<span class="success">✅ 解析完成！处理了 ' + count + ' 个 boxed</span>';
    }
  </script>
</body>
</html>
