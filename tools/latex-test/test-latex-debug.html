<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LaTeX 调试 - 统计所有 boxed</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; }
    .section { background: #f5f5f5; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .error { color: #f5222d; background: #fff2f0; padding: 10px; border-radius: 4px; margin: 5px 0; }
    .success { color: #52c41a; }
    pre { background: #fafafa; border: 1px solid #e8e8e8; padding: 15px; overflow-x: auto; font-size: 12px; }
    input[type="file"] { margin: 20px 0; padding: 15px; border: 2px dashed #1890ff; border-radius: 8px; width: 100%; cursor: pointer; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>🔬 LaTeX 调试 - 统计所有 boxed</h1>
  
  <div class="section">
    <h2>选择 JSON 文件</h2>
    <input type="file" id="fileInput" accept=".json" />
  </div>
  
  <div class="section" id="stats" style="display:none;">
    <h2>统计结果</h2>
    <div id="result"></div>
  </div>

  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const json = JSON.parse(event.target.result);
        const content = json.content || '';
        
        // 统计各种 boxed 格式
        const patterns = {
          '\\boxed{': (content.match(/\\boxed\{/g) || []).length,
          '\boxed{': (content.match(/\boxed\{/g) || []).length,
          '\boxed{}': (content.match(/\boxed\{\}/g) || []).length,
        };
        
        // 找出所有 boxed 出现的位置
        const allMatches = [];
        let match;
        const regex = /\boxed\{([^}]*)\}/g;
        while ((match = regex.exec(content)) !== null) {
          allMatches.push({
            index: match.index,
            full: match[0],
            inner: match[1],
            context: content.substring(Math.max(0, match.index - 30), match.index + 80)
          });
        }
        
        let html = `
          <h3>格式统计</h3>
          <ul>
            <li>\\boxed{ (双反斜杠): ${patterns['\\boxed{']} 个</li>
            <li>\boxed{ (单反斜杠): ${patterns['\boxed{']} 个</li>
            <li>\boxed{} (空括号): ${patterns['\boxed{}']} 个</li>
          </ul>
          
          <h3>所有 boxed 出现位置 (共 ${allMatches.length} 个)</h3>
          <ol>
        `;
        
        allMatches.forEach((m, i) => {
          html += `<li style="margin-bottom:15px;">
            <strong>#${i+1} 位置:</strong> ${m.index}<br>
            <strong>完整:</strong> <code>${escapeHtml(m.full)}</code><br>
            <strong>内容:</strong> <code>${escapeHtml(m.inner)}</code><br>
            <strong>上下文:</strong><br><pre>${escapeHtml(m.context)}</pre>
          </li>`;
        });
        
        html += '</ol>';
        
        // 检查是否有嵌套括号的 boxed
        const nestedBoxed = allMatches.filter(m => m.inner.includes('{'));
        if (nestedBoxed.length > 0) {
          html += `<h3 class="error">⚠️ 嵌套括号的 boxed (${nestedBoxed.length} 个) - 这些需要特殊处理</h3><ul>`;
          nestedBoxed.forEach(m => {
            html += `<li><code>${escapeHtml(m.full)}</code></li>`;
          });
          html += '</ul>';
        }
        
        document.getElementById('result').innerHTML = html;
        document.getElementById('stats').style.display = 'block';
      };
      reader.readAsText(file, 'utf-8');
    });
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
