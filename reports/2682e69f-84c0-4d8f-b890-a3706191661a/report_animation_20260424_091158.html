<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件操作动画报告 - None</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { opacity: 0.8; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover { background: #764ba2; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        .operations {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .operation {
            padding: 15px;
            background: #16213e;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            opacity: 0.3;
            transform: translateX(-20px);
            transition: all 0.5s;
        }
        .operation.active {
            opacity: 1;
            transform: translateX(0);
            background: #1e3a5f;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .operation.success { border-left-color: #4ade80; }
        .operation.failed { border-left-color: #f87171; }
        .operation-type {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        .operation-path {
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
        }
        .operation-arrow {
            color: #667eea;
            margin: 0 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .stat-card {
            padding: 15px;
            background: #16213e;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 文件操作执行动画</h1>
            <p>None</p>
            <p style="margin-top: 10px; font-size: 12px;">会话ID: 2682e69f-84c0-4d8f-b890-a3706191661a</p>
        </div>
        
        <div class="controls">
            <button class="btn" id="playBtn" onclick="playAnimation()">▶️ 播放</button>
            <button class="btn" id="pauseBtn" onclick="pauseAnimation()" disabled>⏸️ 暂停</button>
            <button class="btn" onclick="resetAnimation()">🔄 重置</button>
            <button class="btn" onclick="exportReport()">📄 导出报告</button>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="operations" id="operations">
            <!-- Operations will be inserted here -->
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">5</div>
                <div class="stat-label">总操作数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">1</div>
                <div class="stat-label">成功</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">失败</div>
            </div>
        </div>
    </div>
    
    <script>
        const operations = [{"type": "statistics", "source": "E:\\", "destination": null, "status": "executing", "timestamp": "2026-04-24 09:10:55.915420"}, {"type": "statistics", "source": "E:\\", "destination": null, "status": "executing", "timestamp": "2026-04-24 09:11:01.925249"}, {"type": "statistics", "source": "E:\\", "destination": null, "status": "executing", "timestamp": "2026-04-24 09:11:08.944298"}, {"type": "statistics", "source": "E:\\", "destination": null, "status": "executing", "timestamp": "2026-04-24 09:11:17.955927"}, {"type": "statistics", "source": "E:\\", "destination": null, "status": "success", "timestamp": "2026-04-24 09:11:29.700872"}];
        let currentIndex = 0;
        let isPlaying = false;
        let animationInterval = null;
        
        function renderOperations() {
            const container = document.getElementById('operations');
            container.innerHTML = '';
            
            operations.forEach((op, index) => {
                const div = document.createElement('div');
                div.className = `operation ${op.status}`;
                div.id = `op-${index}`;
                
                const typeMap = {
                    'create': '📄 创建',
                    'delete': '🗑️ 删除',
                    'move': '📦 移动',
                    'copy': '📋 复制',
                    'rename': '✏️ 重命名',
                    'modify': '✏️ 修改'
                };
                
                let pathHtml = '';
                if (op.source && op.destination) {
                    pathHtml = `<span class="operation-path">${op.source}</span>
                               <span class="operation-arrow">→</span>
                               <span class="operation-path">${op.destination}</span>`;
                } else if (op.source) {
                    pathHtml = `<span class="operation-path">${op.source}</span>`;
                } else if (op.destination) {
                    pathHtml = `<span class="operation-path">${op.destination}</span>`;
                }
                
                div.innerHTML = `
                    <div class="operation-type">${typeMap[op.type] || op.type}</div>
                    <div>${pathHtml}</div>
                `;
                
                container.appendChild(div);
            });
        }
        
        function updateProgress() {
            const progress = (currentIndex / operations.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function highlightOperation(index) {
            // Remove active from all
            document.querySelectorAll('.operation').forEach(op => {
                op.classList.remove('active');
            });
            
            // Add active to current
            const current = document.getElementById(`op-${index}`);
            if (current) {
                current.classList.add('active');
                current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        function playAnimation() {
            if (isPlaying) return;
            isPlaying = true;
            
            document.getElementById('playBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            
            animationInterval = setInterval(() => {
                if (currentIndex >= operations.length) {
                    pauseAnimation();
                    return;
                }
                
                highlightOperation(currentIndex);
                updateProgress();
                currentIndex++;
            }, 1500); // 1.5 seconds per operation
        }
        
        function pauseAnimation() {
            isPlaying = false;
            clearInterval(animationInterval);
            
            document.getElementById('playBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
        }
        
        function resetAnimation() {
            pauseAnimation();
            currentIndex = 0;
            updateProgress();
            document.querySelectorAll('.operation').forEach(op => {
                op.classList.remove('active');
            });
        }
        
        function exportReport() {
            window.print();
        }
        
        // Initialize
        renderOperations();
    </script>
</body>
</html>
