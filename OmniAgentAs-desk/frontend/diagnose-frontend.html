<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>前端状态诊断</title>
</head>
<body>
    <h1>前端状态诊断</h1>
    
    <div style="margin: 20px 0;">
        <h2>1. sessionStorage状态</h2>
        <pre id="sessionStorageOutput"></pre>
        <button onclick="loadSessionStorage()">刷新sessionStorage</button>
    </div>
    
    <div style="margin: 20px 0;">
        <h2>2. localStorage状态</h2>
        <pre id="localStorageOutput"></pre>
        <button onclick="loadLocalStorage()">刷新localStorage</button>
    </div>
    
    <div style="margin: 20px 0;">
        <h2>3. URL参数</h2>
        <pre id="urlOutput"></pre>
        <button onclick="loadURL()">刷新URL参数</button>
    </div>
    
    <div style="margin: 20px 0;">
        <h2>4. 当前会话ID（从页面提取）</h2>
        <pre id="sessionIdOutput"></pre>
        <button onclick="extractSessionId()">提取会话ID</button>
    </div>

    <script>
        function loadSessionStorage() {
            const chatState = sessionStorage.getItem('chat_session_state');
            const output = document.getElementById('sessionStorageOutput');
            
            if (chatState) {
                const state = JSON.parse(chatState);
                output.textContent = JSON.stringify(state, null, 2);
                console.log('SessionStorage:', state);
            } else {
                output.textContent = '没有chat_session_state';
            }
        }

        function loadLocalStorage() {
            const output = document.getElementById('localStorageOutput');
            const allKeys = Object.keys(localStorage);
            const relevantKeys = allKeys.filter(key => key.includes('unsaved_messages'));
            
            const result = {};
            relevantKeys.forEach(key => {
                try {
                    result[key] = JSON.parse(localStorage.getItem(key));
                } catch (e) {
                    result[key] = localStorage.getItem(key);
                }
            });
            
            output.textContent = JSON.stringify(result, null, 2);
            console.log('LocalStorage:', result);
        }

        function loadURL() {
            const params = new URLSearchParams(window.location.search);
            const output = document.getElementById('urlOutput');
            
            const result = {
                session_id: params.get('session_id'),
                fullURL: window.location.href,
                pathname: window.location.pathname
            };
            
            output.textContent = JSON.stringify(result, null, 2);
            console.log('URL参数:', result);
        }

        function extractSessionId() {
            // 尝试从localStorage提取
            const lastSessionId = localStorage.getItem('last_session_id');
            
            // 尝试从URL提取
            const params = new URLSearchParams(window.location.search);
            const urlSessionId = params.get('session_id');
            
            // 尝试从sessionStorage提取
            const chatState = sessionStorage.getItem('chat_session_state');
            let sessionStorageId = null;
            if (chatState) {
                const state = JSON.parse(chatState);
                sessionStorageId = state.sessionId;
            }
            
            const output = document.getElementById('sessionIdOutput');
            const result = {
                URL中的session_id: urlSessionId,
                localStorage中的session_id: lastSessionId,
                sessionStorage中的session_id: sessionStorageId
            };
            
            output.textContent = JSON.stringify(result, null, 2);
            console.log('会话ID提取结果:', result);
        }

        // 自动加载
        window.onload = function() {
            loadSessionStorage();
            loadLocalStorage();
            loadURL();
            extractSessionId();
        };
    </script>
</body>
</html>
