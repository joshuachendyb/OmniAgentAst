<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试visibilitychange事件</title>
</head>
<body>
    <h1>测试visibilitychange事件</h1>
    <p id="status">当前状态：可见</p>
    <p>步骤：</p>
    <ol>
        <li>打开控制台</li>
        <li>不要切换标签页</li>
        <li>点击"模拟单页路由切换"按钮</li>
        <li>观察控制台是否输出"visibilitychange触发"</li>
    </ol>
    <button onclick="simulateRouteChange()">模拟单页路由切换</button>
    <p>然后：</p>
    <ol>
        <li>切换到其他标签页</li>
        <li>再切换回这个标签页</li>
        <li>观察控制台</li>
    </ol>

    <script>
        document.addEventListener('visibilitychange', () => {
            console.log('✅ visibilitychange触发！', {
                hidden: document.hidden,
                reason: '标签页可见性变化'
            });
            document.getElementById('status').textContent =
                `当前状态：${document.hidden ? '隐藏' : '可见'}`;
        });

        function simulateRouteChange() {
            console.log('❌ 模拟单页应用路由切换');
            console.log(' - 这不会触发visibilitychange');
            console.log(' - 因为visibilitychange只在标签页可见性变化时触发');
        }
    </script>
</body>
</html>
